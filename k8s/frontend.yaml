apiVersion: apps/v1
kind: Deployment
metadata:
  name: snack-frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snack-frontend
  template:
    metadata:
      labels:
        app: snack-frontend
    spec:
      containers: 
      - name: snack-frontend
        image: localhost/snack-frontend:1.0.0
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
          - name: HOSTNAME
            value: "0.0.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name: snack-frontend-service
spec:
  type: NodePort
  selector:
    app: snack-frontend
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30002 # เข้าหน้าบ้านผ่าน http://localhost:30002